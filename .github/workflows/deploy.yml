name: Déploiement GitHub Pages

on:
  # Déploie à chaque push sur main
  push:
    branches: [main]
  # Permet de relancer manuellement depuis l'onglet Actions
  workflow_dispatch:

# Permissions nécessaires au déploiement Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois ; on annule les runs en attente devenus obsolètes
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Configurer Pages
        uses: actions/configure-pages@v5

      - name: Uploader le site (dossier racine, tel quel)
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
